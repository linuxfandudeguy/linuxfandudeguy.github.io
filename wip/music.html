<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Favorite Music</title>

<!-- 7.css -->
<link rel="stylesheet" href="https://unpkg.com/7.css">

<style>
body {
  background: #008080; /* classic teal looks good with 7.css */
  padding: 30px;
}

.music-grid {
  display: flex;
  gap: 20px;
}

.album {
  cursor: pointer;
}

.album img {
  width: 150px;
  height: auto;
  display: block;
}

#musicWindow {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 999;
}

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 998;
}
</style>
</head>

<body>

<h2>My Favorite Music</h2>

<div class="music-grid">

  <!-- YOUR TRACK -->
  <div class="album"
       onclick="openPlayer('https://www.youtube.com/embed/VUaKxrg_7uE')">
    <img src="https://img.youtube.com/vi/VUaKxrg_7uE/hqdefault.jpg"
         alt="0k - 27315_7.1">
  </div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closePlayer()"></div>

<!-- 7.css Window -->
<div class="window active" id="musicWindow" style="width: 640px;">
  <div class="title-bar">
    <div class="title-bar-text">Now Playing</div>
    <div class="title-bar-controls">
      <button aria-label="Close" onclick="closePlayer()"></button>
    </div>
  </div>

  <div class="window-body">
    <iframe id="player"
            width="100%"
            height="360"
            frameborder="0"
            allow="autoplay; encrypted-media"
            allowfullscreen>
    </iframe>
  </div>
</div>

<script>
function openPlayer(url) {
  document.getElementById("player").src = url + "?autoplay=1";
  document.getElementById("musicWindow").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function closePlayer() {
  document.getElementById("player").src = "";
  document.getElementById("musicWindow").style.display = "none";
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
