<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWU Translator</title>
    <!-- Include GitCSS from your NoteCDN or local if possible -->
    <link rel="stylesheet" href="https://notecdn.vercel.app/fetch/gh/linuxfandudeguy/konichiwa-css@kawaii/konichiwa.css">
</head>
<body>
    <div class="container">
        <h1 class="text-primary">UWU Translator</h1>
        <label for="inputText">Enter text to translate:</label>
        <textarea id="inputText" rows="5" cols="50">Hello, World!</textarea>
        <button class="btn btn-primary" onclick="translateUwu()">Translate</button>
        <h2 class="font-primary font-weight-500">Translated Text:</h2>
        <div id="outputText" class="font-secondary"></div>
    </div>

    <script>
        async function translateUwu() {
            const inputText = document.getElementById('inputText').value;
            try {
                const response = await fetch(`https://uwuify-api.vercel.app/uwuify?text=${encodeURIComponent(inputText)}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok.');
                }
                const data = await response.json();
                // Display only the uwuifiedText from the API response
                document.getElementById('outputText').innerText = data.uwuifiedText;
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
    </script>
</body>
</html>
